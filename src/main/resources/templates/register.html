<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація | Клієнтська база</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Montserrat', sans-serif; }
        .register-card { max-width: 450px; margin: 80px auto; padding: 30px; background: #fff; border-top: 4px solid #d1b894; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-gold { background: #2e2a28; color: #d1b894; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold:hover { background: #d1b894; color: #2e2a28; }
    </style>
</head>
<body>
<div class="register-card">
    <h3 class="text-center mb-4">Реєстрація клієнта</h3>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Номер телефону (Логін)</label>
            <input type="text" th:field="*{phone}" class="form-control" placeholder="+380..." required>
        </div>
        <div class="form-group">
            <label>Повне ім'я</label>
            <input type="text" th:field="*{fullName}" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Назва компанії</label>
            <input type="text" th:field="*{companyName}" class="form-control">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" th:field="*{password}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-gold btn-block p-3">Надіслати запит на доступ</button>
        <p class="text-center mt-3 small">Вже маєте доступ? <a href="/login">Увійти</a></p>
    </form>
</div>
</body>
</html>
