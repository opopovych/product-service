<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Керування доступом - ЄвроКава</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0e0e;
            --accent: #d4a373;
            --card-glass: rgba(255, 255, 255, 0.03);
        }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-weight: 300; margin-bottom: 30px; }
        h1 b { color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
        }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.05); color: var(--accent); text-transform: uppercase; font-size: 0.8rem; }

        .status-badge {
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-active { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .status-inactive { background: rgba(220, 53, 69, 0.2); color: #dc3545; }

        .btn {
            padding: 8px 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat';
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-activate { background: #28a745; color: #fff; }
        .btn-deactivate { background: #dc3545; color: #fff; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .back-link { color: var(--accent); text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <a href="/index" class="back-link">← Назад до панелі</a>
    <h1>Керування <b>Доступом</b></h1>

    <table>
        <thead>
        <tr>
            <th>Ім'я</th>
            <th>Телефон</th>
            <th>Компанія</th>
            <th>Статус</th>
            <th>Дія</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.fullName}">Іван Іванов</td>
            <td th:text="${user.phone}">+380...</td>
            <td th:text="${user.companyName}">-</td>
            <td>
                <span th:if="${user.enabled}" class="status-badge status-active">Активний</span>
                <span th:if="${!user.enabled}" class="status-badge status-inactive">Очікує</span>
            </td>
            <td>
                <form th:if="${!user.enabled}" th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post">
                    <input type="hidden" name="status" value="true">
                    <button type="submit" class="btn btn-activate">Активувати</button>
                </form>
                <form th:if="${user.enabled}" th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post">
                    <input type="hidden" name="status" value="false">
                    <button type="submit" class="btn btn-deactivate">Заблокувати</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
